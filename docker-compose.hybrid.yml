services:
  stt-api:
    build:
      context: ./stt-backend
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      WHISPER_MODEL_SIZE: tiny
      DEVICE: cpu
      COMPUTE_TYPE: int8
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./stt-backend/models:/app/models
      - ./stt-backend/uploads:/app/uploads
    depends_on:
      - redis

  meeting-api:
    build:
      context: ./meeting-backend
      dockerfile: docker/Dockerfile
    network_mode: host
    env_file:
      - ./meeting-backend/.env
    environment:
      STT_SERVICE_URL: http://127.0.0.1:8000
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/2
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/3
    depends_on:
      - redis
      - stt-api

  meeting-worker:
    build:
      context: ./meeting-backend
      dockerfile: docker/Dockerfile
    network_mode: host
    command: celery -A app.workers.celery_worker worker --loglevel=info
    env_file:
      - ./meeting-backend/.env
    environment:
      STT_SERVICE_URL: http://127.0.0.1:8000
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/2
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/3
    depends_on:
      - redis
      - meeting-api

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
